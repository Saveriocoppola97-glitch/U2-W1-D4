<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <title>Esempio di lavagna con Post It</title>
    <meta
      name="description"
      content="Creazione di una lavagna con post animati al rollover"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style/reset.css" />
    <link rel="stylesheet" href="./style/postit.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Story+Script&display=swap");
    </style>
  </head>
  <body>
    <header>
      <h1>POST-IT</h1>
    </header>
    <main>
      <section id="board">
        <div id="allpostIt">
          <div class="postIt hover">
            <p>Task #1</p>
            <span>Creare i postit</span>
          </div>
          <div class="postIt hover">
            <p>Task #2</p>
            <span>Colorarli</span>
          </div>
          <div class="postIt hover">
            <p>Task #3</p>
            <span>Affiancarli</span>
          </div>
          <div class="postIt hover">
            <p>Task #4</p>
            <span>Spaziarli</span>
          </div>
          <div class="postIt hover">
            <p>Task #5</p>
            <span>Ombreggiarli</span>
          </div>
          <div class="postIt hover">
            <p>Task #6</p>
            <span>Ruotarli</span>
          </div>
          <div class="postIt hover">
            <p>Task #7</p>
            <span>Animarli</span>
          </div>
          <div class="postIt hover">
            <p>Task #8</p>
            <span>Testarli</span>
          </div>
        </div>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
